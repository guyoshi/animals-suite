name: Publicar Animals Suite

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restaurar cache do Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Instalar dependências
        run: npm ci

      - name: Validar Animals Suite
        run: npm run validate:final

      - name: Gerar configuração segura do atualizador
        env:
          ANIMALS_UPDATE_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          ANIMALS_UPDATE_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: node scripts/generate-updater-config.mjs

      - name: Compilar e publicar instalador
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Animals Suite v__VERSION__'
          releaseBody: 'Instalador, atualização automática e arquivos desta versão.'
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.updater.generated.conf.json
